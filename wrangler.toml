name = "patungantv-hono"
main = "src/worker.ts"
compatibility_date = "2024-05-21"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./dist"
binding = "ASSETS"

# KV Namespace bindings
[[kv_namespaces]]
binding = "patungan"
id = "128e96cf8f334ca8a1b20897a65fefa8"

# R2 Bucket bindings
[[r2_buckets]]
binding = "vpsai"
bucket_name = "vpsai"

# To deploy, run:
# npm run build
# npx wrangler deploy
